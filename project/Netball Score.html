document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

radius: 4px; transition: width 0.4s linear;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; align-items: center; gap: 10px; margin-top: 2px;\">\n      <button onclick=\"{{ resetTimer }}\" style-active=\"transform: scale(0.92);\" style=\"flex: 0 0 auto; width: 56px; height: 56px; border-radius: 16px; border: 1px solid #2a323f; background: #161b24; color: #aeb7c4; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.06s;\">↺<\u002Fbutton>\n      <button onclick=\"{{ toggleTimer }}\" style-active=\"transform: scale(0.97);\" style=\"flex: 1 1 auto; height: 56px; border-radius: 16px; border: none; background: {{ playBg }}; color: {{ playColor }}; font-family: 'Barlow', sans-serif; font-size: 19px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; transition: transform 0.06s;\">{{ playLabel }}<\u002Fbutton>\n      <button onclick=\"{{ nextHalf }}\" style-active=\"transform: scale(0.92);\" style=\"flex: 0 0 auto; height: 56px; padding: 0 16px; border-radius: 16px; border: 1px solid #2a323f; background: #161b24; color: #aeb7c4; font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.06s;\">{{ nextLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- OPP PANEL -->\n  <div style=\"flex: 1 1 0; min-height: 0; background: #f5318a; display: flex; flex-direction: column; padding: 10px 16px 12px; position: relative;\">\n    <div style=\"display: flex; align-items: center; gap: 12px;\">\n      <button onclick=\"{{ oppMinus }}\" style-active=\"transform: scale(0.92);\" style=\"flex: 0 0 auto; width: 58px; height: 58px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.55); background: rgba(255,255,255,0.12); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.06s;\">−1<\u002Fbutton>\n      <button onclick=\"{{ oppPlus }}\" style-active=\"transform: scale(0.97);\" style=\"flex: 1 1 auto; height: 58px; border-radius: 16px; border: none; background: #fff; color: #f5318a; font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: 0.02em; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.14); transition: transform 0.06s;\">＋ GOAL<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"flex: 1 1 0; min-height: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;\">\n      <span style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: {{ scoreFont }}; line-height: 0.82; color: #fff; font-variant-numeric: tabular-nums;\">{{ opp }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"min-height: 42px; display: flex; align-items: center; justify-content: space-between;\">\n      <span style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.14em; color: rgba(255,255,255,0.7); text-transform: uppercase;\">Away<\u002Fspan>\n      <div style=\"display: flex; align-items: center; gap: 10px;\">\n        <span style=\"font-size: 22px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #fff;\">{{ oppName }}<\u002Fspan>\n        <div style=\"width: 14px; height: 14px; border-radius: 50%; background: #fff;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RESET MATCH (tiny, bottom-safe) -->\n  <button onclick=\"{{ newMatch }}\" style=\"position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; width: 1px; height: 1px; pointer-events: none;\">x<\u002Fbutton>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:400,&quot;height&quot;:840},&quot;wavesName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Waves&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Teams&quot;},&quot;oppName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Opp&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Teams&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    waves: 0,\n    opp: 0,\n    seconds: 0,\n    running: false,\n    half: 1,\n    targetMin: 12,\n    scoreFont: 90,\n  };\n\n  scoreRef = React.createRef();\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('netball-score-v1');\n      if (raw) this.setState({ ...JSON.parse(raw), running: false });\n    } catch (e) {}\n    this._t = setInterval(() => {\n      if (this.state.running) this.setState(s => ({ seconds: s.seconds + 1 }));\n    }, 1000);\n    this.fitScore();\n    if (this.scoreRef.current && window.ResizeObserver) {\n      this._ro = new ResizeObserver(() => this.fitScore());\n      this._ro.observe(this.scoreRef.current);\n    }\n    window.addEventListener('resize', this._fit = () => this.fitScore());\n  }\n  componentWillUnmount() {\n    clearInterval(this._t);\n    if (this._ro) this._ro.disconnect();\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n\n  fitScore() {\n    const el = this.scoreRef.current;\n    if (!el) return;\n    const size = Math.max(16, Math.min(el.clientHeight * 0.8, el.clientWidth * 0.48, 180));\n    if (Math.abs(size - this.state.scoreFont) > 0.5) this.setState({ scoreFont: size });\n  }\n\n  componentDidUpdate() {\n    try {\n      const { waves, opp, seconds, half, targetMin } = this.state;\n      localStorage.setItem('netball-score-v1', JSON.stringify({ waves, opp, seconds, half, targetMin }));\n    } catch (e) {}\n  }\n\n  buzz(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} }\n\n  fmt(s) {\n    const m = Math.floor(s / 60), ss = s % 60;\n    return m + ':' + (ss < 10 ? '0' : '') + ss;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const targetSec = s.targetMin * 60;\n    const over = s.seconds >= targetSec;\n    const pct = Math.min(100, (s.seconds / targetSec) * 100);\n\n    const halfLabel = s.half === 1 ? '1ST HALF' : s.half === 2 ? '2ND HALF' : 'FULL TIME';\n    const nextLabel = s.half === 1 ? 'HALF ›' : s.half === 2 ? 'FULL TIME' : 'NEW';\n\n    return {\n      waves: s.waves,\n      opp: s.opp,\n      scoreRef: this.scoreRef,\n      scoreFont: s.scoreFont + 'px',\n      wavesName: this.props.wavesName ?? 'Waves',\n      oppName: this.props.oppName ?? 'Opp',\n\n      time: this.fmt(s.seconds),\n      target: this.fmt(targetSec),\n      progress: pct + '%',\n      progressColor: over ? '#ffb020' : '#3ddc84',\n      timeColor: over ? '#ffb020' : '#ffffff',\n      halfColor: s.half === 3 ? '#ffb020' : '#7d8696',\n      halfLabel,\n      nextLabel,\n\n      playLabel: s.running ? '❚❚  PAUSE' : '▶  START',\n      playBg: s.running ? '#161b24' : '#3ddc84',\n      playColor: s.running ? '#ffffff' : '#06210f',\n\n      sixBg: s.targetMin === 6 ? '#2a323f' : 'transparent',\n      sixColor: s.targetMin === 6 ? '#ffffff' : '#7d8696',\n      twelveBg: s.targetMin === 12 ? '#2a323f' : 'transparent',\n      twelveColor: s.targetMin === 12 ? '#ffffff' : '#7d8696',\n\n      wavesPlus: () => { this.buzz(12); this.setState(p => ({ waves: p.waves + 1 })); },\n      wavesMinus: () => { this.buzz(12); this.setState(p => ({ waves: Math.max(0, p.waves - 1) })); },\n      oppPlus: () => { this.buzz(12); this.setState(p => ({ opp: p.opp + 1 })); },\n      oppMinus: () => { this.buzz(12); this.setState(p => ({ opp: Math.max(0, p.opp - 1) })); },\n\n      toggleTimer: () => this.setState(p => ({ running: !p.running })),\n      resetTimer: () => this.setState({ seconds: 0, running: false }),\n      nextHalf: () => this.setState(p => {\n        if (p.half === 1) return { half: 2, seconds: 0, running: false };\n        if (p.half === 2) return { half: 3, running: false };\n        return { half: 1, seconds: 0, running: false, waves: 0, opp: 0 };\n      }),\n      setSix: () => this.setState({ targetMin: 6 }),\n      setTwelve: () => this.setState({ targetMin: 12 }),\n      newMatch: () => this.setState({ waves: 0, opp: 0, seconds: 0, running: false, half: 1 }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
